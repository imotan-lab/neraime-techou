<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゴッドイーターチェッカー</title>
  <link rel="stylesheet" href="assets/css/site.css">
  <script src="assets/js/checker-common.js"></script>
</head>
<body onload="loadChecker('godeater')">
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="index.html">狙い目手帳</a>
      <nav class="header-nav">
        <a href="index.html">トップ</a>
        <a href="godeater_article.html">記事へ戻る</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div class="eyebrow">CHECKER</div>
      <h1 class="page-title">ゴッドイーターチェッカー</h1>
      <p class="lead">現在ゲーム数を入力すると、共通ロジックで狙い目ラインを判定します。</p>
    </section>

    <section class="grid grid-2">
      <div class="card checker-box">
        <div class="form-row">
          <label for="gameInput">現在ゲーム数</label>
          <input id="gameInput" type="number" placeholder="例: 450">
        </div>

        <button id="checkBtn" class="btn">判定する</button>

        <div class="result-box">
          <p id="result" class="result-text">ここに判定結果が表示されます。</p>
        </div>

        <div class="cta-row">
          <a class="btn btn-sub" href="godeater_article.html">記事を見る</a>
        </div>
      </div>

      <aside class="card">
        <h3>判定メモ</h3>
        <ul class="point-list">
          <li>このサンプルでは 450G を基準値に設定しています。</li>
          <li>基準値は JSON 側で管理できます。</li>
          <li>見た目は site.css で一括調整できます。</li>
        </ul>
      </aside>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">© 狙い目手帳</div>
  </footer>
</body>
</html>
