<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チェッカー</title>
  <link rel="stylesheet" href="assets/css/page-theme.css">
</head>
<body>
  <header class="site-header">
    <div class="site-wrap header-inner">
      <a class="brand" href="index.html">狙い目手帖</a>
      <nav class="nav-links">
        <a href="index.html">トップ</a>
        <a id="articleBackLink" href="machine.html">記事へ戻る</a>
      </nav>
    </div>
  </header>

  <main class="site-wrap page-main">
    <section class="hero">
      <p class="eyebrow">CHECKER</p>
      <h1 id="checkerTitle" class="page-title">チェッカー</h1>
    </section>

    <section class="cards">
      <article class="card">
        <h2 class="section-title">入力</h2>
        <label class="field-label" for="gameInput">現在G数</label>
        <input id="gameInput" class="field-input" type="number" placeholder="例: 400">
        <div class="action-row">
          <button id="checkBtn" class="btn-primary" type="button">判定する</button>
        </div>
      </article>

      <article class="card">
        <h2 class="section-title">判定結果</h2>
        <div id="result" class="result-box">ここに結果が表示されます。</div>
      </article>
    </section>
  </main>

  <script src="assets/js/machine-data.js"></script>
  <script src="assets/js/checker-page.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const slug = params.get("slug");
      const back = document.getElementById("articleBackLink");
      if (back && slug) back.href = "machine.html?slug=" + slug;
    })();
  </script>
</body>
</html>
