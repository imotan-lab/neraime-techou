<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>狙い目チェッカー | 狙い目手帖</title>
  <meta name="description" content="現在のゲーム数から狙い目かどうかを簡易判定するチェッカーです。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=Oswald:wght@500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <header class="page-header">
    <div class="wrap header-inner">
      <a class="brand" href="./">
        <p class="page-eyebrow">Checker Tool</p>
        <h1 class="site-title">狙い目手帖</h1>
      </a>
      <a id="articleBack" class="back-link" href="./">← 記事へ戻る</a>
    </div>
  </header>

  <main class="wrap">
    <section class="page-hero">
      <div class="page-summary">
        <section class="lead-card article-card">
          <h1 id="checkerTitle" class="page-title">読み込み中...</h1>
          <p class="page-strategy">現在のゲーム数と台の状態を入れると、自動で簡易判定します。</p>
        </section>
        <aside class="toc-card">
          <h2>入力項目</h2>
          <nav>
            <a href="#checkerMain">通常 / リセット</a>
            <a href="#checkerMain">現在のゲーム数</a>
            <a href="#checkerMain">判定結果</a>
          </nav>
        </aside>
      </div>
    </section>

    <div class="checker-wrap">
      <section id="checkerMain" class="checker-card">
        <h2>狙い目チェッカー</h2>
        <div class="checker-form">
          <div>
            <label class="field-label" for="stateSelect">台の状態</label>
            <div class="inline-fields">
              <select id="stateSelect" class="select">
                <option value="normal">通常</option>
                <option value="reset">リセット</option>
              </select>
              <input id="currentGame" class="input" type="number" min="0" step="1" placeholder="現在のゲーム数を入力">
            </div>
          </div>
        </div>

        <div id="judgeResult" class="judge-panel judge-panel--muted">
          <p class="judge-rank">-</p>
          <p class="judge-title">数値を入力するとここに判定が出ます</p>
          <p class="judge-text">記事ページで基準を見ながら、最後の確認として使う想定です。</p>
        </div>
      </section>

      <aside class="side-card">
        <h2>判定の見方</h2>
        <div class="info-table">
          <div class="info-row"><div class="info-label">◎</div><div class="info-value">狙い目ライン到達</div></div>
          <div class="info-row"><div class="info-label">○</div><div class="info-value">あと少しで狙い目</div></div>
          <div class="info-row"><div class="info-label">×</div><div class="info-value">まだ浅め</div></div>
        </div>
        <p class="note">機種ごとの補足は記事ページで確認し、このページは最終判断に絞っています。</p>
      </aside>
    </div>
  </main>

  <script>
    const slug = new URLSearchParams(location.search).get('slug');
    let checkerData = null;
    let machineData = null;

    function renderResult(mode, value) {
      const result = document.getElementById('judgeResult');
      if (!checkerData) {
        result.className = 'judge-panel judge-panel--muted';
        result.innerHTML = '<p class="judge-rank">-</p><p class="judge-title">データ読み込み中です</p><p class="judge-text">少し待ってからもう一度確認してください。</p>';
        return;
      }
      if (!value && value !== 0) {
        result.className = 'judge-panel judge-panel--muted';
        result.innerHTML = '<p class="judge-rank">-</p><p class="judge-title">数値を入力すると判定します</p><p class="judge-text">記事ページで基準を確認しながら最後の判断に使う想定です。</p>';
        return;
      }
      const threshold = mode === 'reset' ? Number(checkerData.resetThreshold || 0) : Number(checkerData.gameThreshold || 0);
      if (!threshold) {
        result.className = 'judge-panel judge-panel--muted';
        result.innerHTML = '<p class="judge-rank">-</p><p class="judge-title">この機種の基準は確認中です</p><p class="judge-text">詳細は記事ページでご確認ください。</p>';
        return;
      }
      const diff = threshold - value;
      if (value >= threshold) {
        result.className = 'judge-panel judge-panel--ok';
        result.innerHTML = `<p class="judge-rank">◎</p><p class="judge-title">狙い目ラインに到達しています</p><p class="judge-text">${mode === 'reset' ? 'リセット時' : '通常時'}の目安 ${threshold}G〜 を満たしています。` + (machineData && machineData.strategy ? `記事の基準は ${machineData.strategy} です。` : '') + '</p>';
      } else if (diff <= 100) {
        result.className = 'judge-panel judge-panel--warn';
        result.innerHTML = `<p class="judge-rank">○</p><p class="judge-title">あと少しで狙い目ラインです</p><p class="judge-text">${mode === 'reset' ? 'リセット時' : '通常時'}の目安 ${threshold}G〜 まであと ${diff}G です。</p>`;
      } else {
        result.className = 'judge-panel judge-panel--ng';
        result.innerHTML = `<p class="judge-rank">×</p><p class="judge-title">まだ浅めです</p><p class="judge-text">${mode === 'reset' ? 'リセット時' : '通常時'}の目安 ${threshold}G〜 まであと ${diff}G あります。</p>`;
      }
    }

    Promise.all([
      fetch('assets/data/machines.json').then(r => r.json()),
      fetch('assets/data/checkers/' + slug + '.json').then(r => r.json())
    ]).then(([machines, checker]) => {
      checkerData = checker;
      machineData = machines.find(x => x.slug === slug);
      document.getElementById('checkerTitle').textContent = machineData ? machineData.name + ' チェッカー' : '狙い目チェッカー';
      document.getElementById('articleBack').href = machineData ? 'machine.html?slug=' + machineData.slug : './';
      document.title = (machineData ? machineData.name + ' ' : '') + '狙い目チェッカー | 狙い目手帖';
      renderResult(document.getElementById('stateSelect').value, Number(document.getElementById('currentGame').value));
    }).catch(() => {
      document.getElementById('checkerTitle').textContent = '読み込みに失敗しました';
    });

    document.getElementById('stateSelect').addEventListener('change', () => {
      renderResult(document.getElementById('stateSelect').value, Number(document.getElementById('currentGame').value));
    });
    document.getElementById('currentGame').addEventListener('input', (e) => {
      const raw = e.target.value;
      renderResult(document.getElementById('stateSelect').value, raw === '' ? null : Number(raw));
    });
  </script>
</body>
</html>
