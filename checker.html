<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>チェッカー</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;padding:40px}
.box{max-width:600px;margin:auto}
input{padding:10px;font-size:18px;width:100%}
button{margin-top:20px;padding:10px 20px;font-size:18px}
</style>
</head>

<body>

<div class="box">

<h1 id="title">チェッカー</h1>

<input id="game" type="number" placeholder="現在G数">

<button onclick="check()">判定する</button>

<div id="result">ここに結果</div>

</div>

<script>

async function init(){

const slug=new URLSearchParams(location.search).get("slug")

const res=await fetch("assets/data/machines.json")

const data=await res.json()

const m=data.find(v=>v.slug===slug)

if(!m)return

document.getElementById("title").textContent=m.name+" チェッカー"

window.target=m.checker?.target ?? 0
window.ok=m.checker?.ok ?? "OK"
window.ng=m.checker?.ng ?? "NG"

}

function check(){

const g=Number(document.getElementById("game").value||0)

document.getElementById("result").textContent = g>=target ? ok : ng

}

init()

</script>

</body>
</html>
