<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>狙い目手帖</title>
  <meta name="description" content="スロットの狙い目・やめどき・リセット情報を機種別に確認できる狙い目情報サイトです。">
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <p class="site-eyebrow">スロット狙い目情報サイト</p>
      <h1 class="site-title">狙い目手帖</h1>
      <p class="site-lead">機種ごとの狙い目・やめどき・チェッカーを、黒×金ベースで見やすく整理しています。</p>
    </div>
  </header>

  <main class="wrap">
    <section class="section-head">
      <div>
        <h2>掲載機種一覧</h2>
        <p>現在の掲載機種は18機種です。準備中の機種も順次内容を整えていきます。</p>
      </div>
    </section>
    <div id="machineGrid" class="machine-grid"></div>
  </main>

  <script>
    fetch('assets/data/machines.json')
      .then(r => r.json())
      .then(list => {
        const grid = document.getElementById('machineGrid');
        grid.innerHTML = '';
        list.forEach(machine => {
          const card = document.createElement('article');
          card.className = 'machine-card';
          card.innerHTML = `
            <div class="machine-card__body">
              <p class="machine-card__eyebrow">${machine.info || 'スロット'}</p>
              <h3 class="machine-card__title">${machine.name}</h3>
              <p class="machine-card__strategy">狙い目：${machine.strategy || '準備中'}</p>
            </div>
            <div class="machine-card__actions">
              <a class="btn btn-main" href="machine.html?slug=${machine.slug}">記事を見る</a>
              <a class="btn btn-sub" href="checker.html?slug=${machine.slug}">チェッカー</a>
            </div>
          `;
          grid.appendChild(card);
        });
      })
      .catch(() => {
        document.getElementById('machineGrid').innerHTML = '<p class="notice">機種データの読み込みに失敗しました。</p>';
      });
  </script>
</body>
</html>
