<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>狙い目手帳 | 機種一覧</title>
  <meta name="description" content="スロット機種ごとの狙い目記事とチェッカーを一覧で確認できます。">
  <link rel="stylesheet" href="assets/css/site.css">
  <script src="assets/js/index.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="index.html">狙い目手帳</a>
      <nav class="header-nav">
        <a href="index.html">トップ</a>
        <a href="contact.html">お問い合わせ</a>
        <a href="privacy.html">プライバシーポリシー</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div class="eyebrow">INDEX</div>
      <h1 class="page-title">機種一覧</h1>
      <p class="lead">記事とチェッカーを機種ごとにまとめています。新機種は machines.json に追加すると一覧へ自動反映されます。</p>
    </section>

    <section class="card index-toolbar">
      <div>
        <h2 class="section-title">掲載機種</h2>
        <p class="lead-inline">現在の掲載数: <strong id="machineCount">読み込み中...</strong></p>
      </div>
      <div class="search-wrap">
        <label class="search-label" for="machineSearch">機種名検索</label>
        <input id="machineSearch" type="search" class="search-input" placeholder="例: 北斗 / godeater / バキ">
      </div>
    </section>

    <section id="machineList" class="machine-grid" aria-live="polite"></section>
    <p id="machineEmpty" class="empty-message card" hidden>該当する機種がありません。</p>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">© 狙い目手帳</div>
  </footer>
</body>
</html>
