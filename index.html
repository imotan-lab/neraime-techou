<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>狙い目手帖</title>
  <meta name="description" content="スマホで見やすいスロット狙い目サイト。機種記事とチェッカーをすぐ開けます。">
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <div class="nav-backdrop" id="navBackdrop"></div>
  <nav class="site-nav" id="siteNav" aria-hidden="true">
    <button class="nav-close" id="navClose" aria-label="メニューを閉じる">×</button>
    <div class="nav-search-wrap">
      <div class="search-shell search-shell--nav">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M10.5 18a7.5 7.5 0 1 1 5.14-12.96A7.5 7.5 0 0 1 10.5 18Zm0 0 7 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input id="navSearchInput" class="search-input" type="search" placeholder="機種名・略称で検索">
      </div>
    </div>
    <div class="nav-links">
      <a class="nav-link" href="./"><span>トップ</span></a>
      <a class="nav-link" href="./#machine-search"><span>機種一覧</span></a>
      <a class="nav-link" href="./contact.html"><span>お問い合わせ</span></a>
      <a class="nav-link" href="./privacy.html"><span>プライバシーポリシー</span></a>
    </div>
    <section class="nav-machine-section">
      <h2 class="nav-section-title">機種一覧</h2>
      <div id="navMachineList" class="nav-machine-list"></div>
      <p id="navMachineEmpty" class="machine-empty u-hidden">一致する機種がありません。</p>
    </section>
  </nav>

  <header class="site-header">
    <div class="wrap">
      <div class="header-top">
        <div class="brand-lockup">
          <h1 class="site-title">狙い目手帖</h1>
        </div>
        <div class="header-actions">
          <button class="menu-toggle" id="menuToggle" aria-label="メニューを開く"><span></span></button>
        </div>
      </div>
      <div class="hero-copy">
        <p class="site-lead">ホールで迷わず使えるように、記事とチェッカーをすぐ開ける形でまとめています。</p>
      </div>
    </div>
  </header>

  <main class="wrap top-layout top-layout--single">
    <div class="top-main">
      <section class="intro-section">
        <h2 class="section-title">このサイトについて</h2>
        <p class="intro-copy">各機種の記事ページに天井・モード・ゾーン・やめどきをまとめ、右側のチェッカーボタンからすぐ判定へ進める構成です。</p>
      </section>

      <section class="search-panel" id="machine-search">
        <div class="search-shell">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M10.5 18a7.5 7.5 0 1 1 5.14-12.96A7.5 7.5 0 0 1 10.5 18Zm0 0 7 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input id="searchInput" class="search-input" type="search" placeholder="機種名・略称で検索">
        </div>
      </section>

      <section class="machine-list machine-list--table" aria-labelledby="machineListTitle">
        <div class="machine-list__bar">
          <h2 id="machineListTitle" class="section-title">機種一覧</h2>
          <p class="machine-list__count"><span id="machineCount">0</span>機種</p>
        </div>
        <div class="machine-list__shell">
          <div class="machine-list__head machine-list__head--simple">
            <div>機種名</div>
            <div>チェッカー</div>
          </div>
          <div id="machineList"></div>
        </div>
        <p id="machineEmpty" class="machine-empty u-hidden">一致する機種がありません。</p>
      </section>
    </div>
  </main>

  <script>
    const aliasMap = {
      baki: ['刃牙','ばき','baki'],
      banchou4: ['番長','番長4','ばんちょう','ばんちょう4','bancho'],
      biohazard: ['バイオ','ばいお','bio'],
      chibaryo2: ['チバリヨ','ちばりよ','ちばりよ2','チバ2'],
      dumbbell: ['ダンベル','だんべる','だんべる何キロ持てる'],
      goblin: ['ゴブスレ','ごぶすれ','ゴブリン'],
      godeater: ['ゴッドイーター','ごっどいーたー','ゴッド','god eater','ge'],
      hokuto: ['北斗','ほくと','hokuto'],
      hokuto_tensei2: ['転生2','てんせい2','北斗転生'],
      kabaneri: ['カバネリ','かばねり','かば','甲鉄城'],
      kaguya: ['かぐや','かぐや様','カグヤ'],
      koukaku: ['攻殻','こうかく','攻殻機動隊'],
      monkeyv: ['モンキー','もんきー','モンキー5','monkey'],
      sf5: ['スト5','ストV','すと5','すとV','ストファイ'],
      tekken6: ['鉄拳','てっけん','tekken'],
      tensura: ['転スラ','てんすら','スライム'],
      tokyo_ghoul: ['喰種','ぐーる','グール','東京グール'],
      valvrave2: ['ヴヴヴ','ゔゔゔ','vvv','ヴァルヴ','ゔぁるゔ','ヴァルヴレイヴ']
    };

    const hiraToKata = (value) => String(value || '').replace(/[ぁ-ゖ]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60));
    const normalize = (value) => hiraToKata(String(value || '').toLowerCase()).replace(/[\s　・\-ー_！？!?,.]/g, '');
    let machineList = [];

    const machineLabel = (machine) => machine.name.replace(/^スマスロ\s*/,'');

    const renderMachines = (items, rootId, emptyId, countId, isNav = false) => {
      const root = document.getElementById(rootId);
      const empty = document.getElementById(emptyId);
      if (!root || !empty) return;
      if (countId && document.getElementById(countId)) document.getElementById(countId).textContent = items.length;
      if (!items.length) {
        root.innerHTML = '';
        empty.classList.remove('u-hidden');
        return;
      }
      empty.classList.add('u-hidden');
      root.innerHTML = items.map(machine => isNav ? `
        <div class="nav-machine-item">
          <a class="nav-machine-link" href="machine.html?slug=${machine.slug}">${machineLabel(machine)}</a>
          <a class="nav-machine-checker" href="checker.html?slug=${machine.slug}">判定</a>
        </div>
      ` : `
        <article class="machine-list__row machine-list__row--simple">
          <div class="machine-list__primary">
            <a class="machine-list__name machine-list__name--link" href="machine.html?slug=${machine.slug}">${machineLabel(machine)}</a>
          </div>
          <div class="machine-list__actions machine-list__actions--single"><a class="btn btn-main btn-block" href="checker.html?slug=${machine.slug}">チェッカー</a></div>
        </article>
      `).join('');
    };

    const filterMachines = (query = '') => {
      const q = normalize(query);
      if (!q) return machineList;
      return machineList.filter(machine => {
        const aliases = aliasMap[machine.slug] || [];
        const corpus = [machine.name, machine.slug, ...aliases].map(normalize).join('|');
        return corpus.includes(q);
      });
    };

    const syncRender = (query = '') => {
      const filtered = filterMachines(query);
      renderMachines(filtered, 'machineList', 'machineEmpty', 'machineCount', false);
      renderMachines(filtered, 'navMachineList', 'navMachineEmpty', null, true);
    };

    fetch('assets/data/machines.json')
      .then(r => r.json())
      .then(list => {
        machineList = Array.isArray(list) ? list : [];
        syncRender('');
      })
      .catch(() => {
        document.getElementById('machineList').innerHTML = '<p class="notice">機種データの読み込みに失敗しました。</p>';
      });

    ['searchInput','navSearchInput'].forEach(id => {
      const input = document.getElementById(id);
      if (!input) return;
      input.addEventListener('input', (event) => {
        const value = event.target.value;
        document.querySelectorAll('#searchInput, #navSearchInput').forEach(el => { if (el !== event.target) el.value = value; });
        syncRender(value);
      });
    });

    const menuToggle = document.getElementById('menuToggle');
    const nav = document.getElementById('siteNav');
    const navBackdrop = document.getElementById('navBackdrop');
    const navClose = document.getElementById('navClose');
    const setMenu = (open) => {
      nav.classList.toggle('is-open', open);
      navBackdrop.classList.toggle('is-open', open);
      menuToggle.classList.toggle('is-open', open);
      nav.setAttribute('aria-hidden', open ? 'false' : 'true');
    };
    menuToggle.addEventListener('click', () => setMenu(!nav.classList.contains('is-open')));
    navClose.addEventListener('click', () => setMenu(false));
    navBackdrop.addEventListener('click', () => setMenu(false));
  </script>
</body>
</html>
