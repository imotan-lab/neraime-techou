<script>
(function(){
  const params = new URLSearchParams(location.search);
  const slug = params.get("slug");

  if (!slug) return;

  fetch("assets/data/machines.json")
    .then(res => res.json())
    .then(list => {
      const m = list.find(x => x.slug === slug);
      if (!m) return;

      // ===== SF5専用処理 =====
      if (slug === "sf5") {
        const checkerArea = document.getElementById("checker-area");
        if (checkerArea) {
          checkerArea.innerHTML = `
            <div style="
              border:1px solid #d4af37;
              padding:16px;
              margin:16px 0;
              font-size:14px;
              line-height:1.6;
              background:#111;
              color:#fff;
            ">
              この機種は天井非搭載のため、ハイエナ狙いには向きません。設定狙い主体の機種です。高設定をつかめる環境（イベント・特定日）での使用を推奨します。
            </div>
          `;
        }
        return;
      }

      // ===== 通常のチェッカー処理（既存そのまま） =====
      renderChecker(m);
    });

  function renderChecker(machine){
    const checkerArea = document.getElementById("checker-area");
    if (!checkerArea) return;

    checkerArea.innerHTML = `
      <div>（ここは既存のままでOK）</div>
    `;
  }

})();
</script>
