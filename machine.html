<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>機種ページ</title>
  <link rel="stylesheet" href="assets/css/site.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="brand" href="index.html">狙い目手帖</a>
      <nav class="header-nav">
        <a href="index.html">トップ</a>
        <a id="checker-link" href="checker.html">チェッカー</a>
        <a href="contact.html">お問い合わせ</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div class="eyebrow">ARTICLE</div>
      <h1 id="machine-title" class="page-title">機種ページ</h1>
      <p class="lead">機種情報を共通URLで表示します。</p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>基本情報</h2>
        <div id="machine-info"></div>
      </article>

      <article class="card">
        <h2>狙い目</h2>
        <div id="strategy"></div>
        <div style="margin-top:20px;">
          <a id="checker-link-card" class="btn" href="checker.html">狙い目チェッカー</a>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">© 狙い目手帖</div>
  </footer>

  <script src="assets/js/machine-data.js"></script>
  <script src="assets/js/machine-page.js"></script>
  <script>
    (function () {
      const navLink = document.getElementById("checker-link");
      const cardLink = document.getElementById("checker-link-card");
      const sync = () => {
        if (navLink && cardLink) cardLink.href = navLink.href;
      };
      const observer = new MutationObserver(sync);
      if (navLink) observer.observe(navLink, { attributes: true, attributeFilter: ["href"] });
      sync();
    })();
  </script>
</body>
</html>
