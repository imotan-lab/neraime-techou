<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>機種ページ | 狙い目手帖</title>
  <meta name="description" content="機種ごとの狙い目・やめどき・リセット情報を掲載しています。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=Oswald:wght@500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <header class="page-header">
    <div class="wrap header-inner">
      <a class="brand" href="./">
        <p id="pageInfo" class="page-eyebrow">Machine Guide</p>
        <h1 class="site-title">狙い目手帖</h1>
      </a>
      <a class="back-link" href="./">← 一覧へ戻る</a>
    </div>
  </header>

  <main class="wrap">
    <section class="page-hero">
      <div class="page-summary">
        <section class="lead-card article-card">
          <h1 id="pageTitle" class="page-title">読み込み中...</h1>
          <p id="pageStrategy" class="page-strategy"></p>
          <div class="quick-points">
            <div class="quick-point"><strong id="quickTenjo">-</strong><span>天井</span></div>
            <div class="quick-point"><strong id="quickAim">-</strong><span>通常狙い</span></div>
            <div class="quick-point"><strong id="quickReset">-</strong><span>リセット</span></div>
          </div>
        </section>
        <aside class="toc-card">
          <h2>目次</h2>
          <nav>
            <a href="#overviewSec">概要</a>
            <a href="#tableSec">要点早見表</a>
            <a href="#detailSec">補足</a>
          </nav>
        </aside>
      </div>
    </section>

    <div class="article-wrap">
      <div class="article-main">
        <section id="overviewSec" class="article-card">
          <h2>概要</h2>
          <p id="overview">読み込み中...</p>
        </section>

        <section id="tableSec" class="article-card">
          <h2>要点早見表</h2>
          <div class="info-table" id="summaryTable"></div>
          <p class="note">まずは表で全体像を確認し、細かい補足はその下で読む形にしています。</p>
        </section>

        <section id="detailSec" class="article-grid">
          <article class="mini-card">
            <h3>狙い目</h3>
            <p id="strategy">読み込み中...</p>
          </article>
          <article class="mini-card">
            <h3>やめどき</h3>
            <p id="yametoki">読み込み中...</p>
          </article>
          <article class="mini-card">
            <h3>リセット</h3>
            <p id="reset">読み込み中...</p>
          </article>
          <article class="mini-card">
            <h3>注意点</h3>
            <p id="caution">読み込み中...</p>
          </article>
        </section>
      </div>

      <aside class="article-side">
        <section class="side-card">
          <h2>すぐ確認する</h2>
          <p>現在G数の確認が必要なら、右下のボタンからチェッカーへ移動できます。</p>
          <div class="side-actions">
            <a class="btn btn-main btn-block" id="checkerLink" href="#">狙い目チェッカーへ</a>
            <a class="btn btn-sub btn-block" href="./">機種一覧へ</a>
          </div>
        </section>
      </aside>
    </div>
  </main>

  <script>
    const slug = new URLSearchParams(location.search).get('slug');

    const fillText = (id, value) => {
      document.getElementById(id).textContent = value || '準備中';
    };

    function pickStartNumber(text) {
      const m = String(text || '').match(/\d+[A-Za-zぁ-んァ-ヶ一-龠\+〜~]*/);
      return m ? m[0] : '確認中';
    }

    Promise.all([
      fetch('assets/data/machines.json').then(r => r.json()),
      fetch('assets/data/machine-details/' + slug + '.json').then(r => r.json()),
      fetch('assets/data/checkers/' + slug + '.json').then(r => r.json()).catch(() => null)
    ]).then(([machines, details, checker]) => {
      const machine = machines.find(x => x.slug === slug);
      if (!machine) {
        document.getElementById('pageTitle').textContent = '機種が見つかりません';
        return;
      }

      document.title = machine.name + ' | 狙い目手帖';
      document.getElementById('pageTitle').textContent = machine.name;
      document.getElementById('pageInfo').textContent = machine.info || 'Machine Guide';
      document.getElementById('pageStrategy').textContent = machine.strategy ? '現在の通常狙い目の目安：' + machine.strategy : '狙い目は確認中です。';
      document.getElementById('checkerLink').href = 'checker.html?slug=' + machine.slug;

      fillText('overview', details.overview);
      fillText('strategy', details.strategy || machine.strategy);
      fillText('yametoki', details.yametoki);
      fillText('reset', details.reset);
      fillText('caution', details.caution);

      document.getElementById('quickTenjo').textContent = pickStartNumber(details.tenjo);
      document.getElementById('quickAim').textContent = checker && checker.gameThreshold ? checker.gameThreshold + 'G〜' : (machine.strategy || '確認中');
      document.getElementById('quickReset').textContent = checker && checker.resetThreshold ? checker.resetThreshold + 'G〜' : '確認中';

      const rows = [
        ['天井', details.tenjo || '準備中'],
        ['通常狙い目', details.strategy || machine.strategy || '準備中'],
        ['やめどき', details.yametoki || '準備中'],
        ['リセット', details.reset || '準備中'],
        ['注意点', details.caution || '準備中']
      ];
      document.getElementById('summaryTable').innerHTML = rows.map(([label, value]) => `
        <div class="info-row">
          <div class="info-label">${label}</div>
          <div class="info-value">${value}</div>
        </div>
      `).join('');
    }).catch(() => {
      document.getElementById('pageTitle').textContent = '読み込みに失敗しました';
    });
  </script>
</body>
</html>
