name: Update Machine Ranking

on:
  schedule:
    - cron: '0 18 * * *'  # 毎日UTC18:00 = 日本時間翌3:00
  workflow_dispatch:       # 手動実行も可能

jobs:
  update-ranking:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ランキングを更新
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/update_ranking.py

      - name: machines.json をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/machines.json
          git diff --staged --quiet || git commit -m "chore: update machine ranking [skip ci]"
          git push
